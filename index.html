<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NutriAI">
<meta name="theme-color" content="#c9a96e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>NutriAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
  :root {
    --bg:#f5f0e8; --surface:#ede8df; --card:#fff9f0; --border:#ddd5c4;
    --accent:#c9873a; --glow:#c9873a22; --green:#5a8a5a;
    --orange:#c9873a; --pink:#b85555; --text:#2c2416; --muted:#8a7a65;
    --user-bubble:#c9873a; --ai-bubble:#fff9f0;
    --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{color:var(--text);font-family:'DM Sans','Hiragino Sans',sans-serif;display:flex;justify-content:center;}
  #app{width:100%;max-width:440px;height:100%;display:flex;flex-direction:column;overflow:hidden;padding-top:var(--safe-top);}

  /* API Key Screen */
  #screen-apikey{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg);}
  .apikey-logo{font-size:48px;margin-bottom:8px;}
  .apikey-title{font-size:22px;font-weight:800;margin-bottom:6px;text-align:center;color:var(--text);}
  .apikey-sub{font-size:12px;color:var(--muted);margin-bottom:32px;text-align:center;line-height:1.7;}
  .apikey-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 12px #c9873a11;}
  .apikey-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .apikey-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;outline:none;font-family:monospace;transition:border-color 0.2s;}
  .apikey-input:focus{border-color:var(--accent);}
  .apikey-hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .apikey-hint a{color:var(--accent);text-decoration:none;}
  .apikey-btn{width:100%;padding:13px 0;border-radius:11px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:14px;font-weight:700;margin-top:16px;}
  .apikey-btn:disabled{background:var(--border);cursor:default;color:var(--muted);}
  .apikey-error{font-size:11px;color:var(--pink);margin-top:8px;display:none;}

  .header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;box-shadow:0 1px 4px #c9873a11;}
  .logo{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
  .logo span{color:var(--accent);}
  .logo-sub{font-size:9px;color:var(--muted);}
  .kcal-badge{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:5px 11px;text-align:center;cursor:pointer;}
  .kcal-badge .val{font-size:15px;font-weight:700;}
  .kcal-badge .sub{font-size:9px;color:var(--muted);}

  .screen{flex:1;display:none;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}
  .scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}

  .nav{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:var(--safe-bottom);box-shadow:0 -1px 4px #c9873a11;}
  .nav-btn{flex:1;padding:9px 4px 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .nav-icon{font-size:17px;}
  .nav-label{font-size:10px;color:var(--muted);}
  .nav-btn.active .nav-label{color:var(--accent);font-weight:700;}
  .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);display:none;}
  .nav-btn.active .nav-dot{display:block;}

  /* Onboarding */
  .ob-wrap{flex:1;overflow-y:auto;padding:14px 14px 28px;-webkit-overflow-scrolling:touch;}
  .progress-bar{display:flex;gap:5px;margin-bottom:20px;}
  .progress-step{flex:1;}
  .progress-fill{height:3px;border-radius:2px;background:var(--border);transition:background 0.3s;}
  .progress-fill.done{background:var(--accent);}
  .progress-name{font-size:10px;color:var(--muted);margin-top:3px;}
  .progress-step.done .progress-name{color:var(--accent);}
  .ob-title{font-size:19px;font-weight:800;margin-bottom:3px;}
  .ob-sub{font-size:11px;color:var(--muted);margin-bottom:18px;}
  .sex-row{display:flex;gap:8px;margin-bottom:16px;}
  .sex-btn{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;}
  .sex-btn.active{border-color:var(--accent);background:#c9873a18;color:var(--accent);}
  .slider-wrap{margin-bottom:16px;}
  .slider-top{display:flex;justify-content:space-between;margin-bottom:5px;}
  .slider-label{font-size:12px;color:var(--muted);}
  .slider-val{font-size:13px;font-weight:700;}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);cursor:pointer;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px #c9873a44;}
  .slider-range{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px;}
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:8px;}
  .result-row{display:flex;justify-content:space-between;margin-bottom:7px;}
  .result-label{font-size:11px;color:var(--muted);}
  .result-val{font-size:13px;font-weight:700;}
  .kcal-big{font-size:26px;font-weight:800;color:var(--accent);}
  .kcal-unit{font-size:12px;color:var(--muted);font-weight:400;}
  .activity-btn{width:100%;padding:11px 13px;margin-bottom:7px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;text-align:left;transition:all 0.2s;}
  .activity-btn.active{border-color:var(--accent);background:#c9873a18;}
  .activity-btn.active .act-label{color:var(--accent);}
  .act-label{font-size:13px;font-weight:600;}
  .act-desc{font-size:11px;color:var(--muted);margin-top:1px;}
  .goal-highlight{background:#c9873a18;border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin-top:8px;}
  .goal-kcal{font-size:30px;font-weight:800;color:var(--accent);margin-top:3px;}
  .ob-btns{display:flex;gap:8px;margin-top:18px;}
  .btn-back{flex:1;padding:12px 0;border-radius:11px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .btn-next{flex:2;padding:12px 0;border-radius:11px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:14px;font-weight:700;}

  /* Date nav */
  .date-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .date-arrow{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;background:var(--card);}
  .date-label{font-size:13px;font-weight:700;}
  .date-today{font-size:10px;color:var(--accent);text-align:center;}

  /* Chat */
  .chat-messages{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;background:var(--bg);}
  .bubble-wrap{display:flex;margin-bottom:4px;}
  .bubble-wrap.user{justify-content:flex-end;}
  .bubble-wrap.ai{justify-content:flex-start;}
  .ai-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;margin-right:7px;flex-shrink:0;align-self:flex-end;color:#fff;}
  .bubble{max-width:78%;padding:9px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
  .bubble.user{background:var(--accent);border-radius:16px 16px 4px 16px;color:#fff;}
  .bubble.ai{background:var(--ai-bubble);border:1px solid var(--border);border-radius:16px 16px 16px 4px;color:var(--text);box-shadow:0 1px 4px #c9873a11;}
  .bubble.exercise{background:#e8f4e8;border:1px solid #a8d4a8;border-radius:16px 16px 16px 4px;color:var(--text);box-shadow:0 1px 4px #5a8a5a11;}
  .timestamp{font-size:10px;color:var(--muted);margin-bottom:8px;padding:0 4px;}
  .timestamp.user{text-align:right;}
  .timestamp.ai{text-align:left;padding-left:34px;}
  .typing{display:flex;gap:4px;padding:9px 13px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  .chat-input-wrap{padding:9px 11px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:7px;align-items:flex-end;flex-shrink:0;padding-bottom:calc(9px + var(--safe-bottom));}
  textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:9px 13px;color:var(--text);font-size:13px;resize:none;line-height:1.5;font-family:inherit;outline:none;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--accent);}
  .send-btn{width:40px;height:40px;border-radius:11px;border:none;background:var(--border);color:var(--muted);cursor:default;font-size:17px;flex-shrink:0;transition:all 0.2s;}
  .send-btn.ready{background:var(--accent);color:#fff;cursor:pointer;}

  /* Food/Exercise log */
  .food-entry{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px #c9873a09;}
  .food-entry.exercise{background:#f0f8f0;border-color:#a8d4a8;}
  .food-name{font-size:13px;font-weight:600;}
  .food-amount{font-size:11px;color:var(--muted);}
  .food-kcal{font-size:13px;color:var(--accent);font-weight:700;text-align:right;}
  .food-entry.exercise .food-kcal{color:var(--green);}
  .food-macro{font-size:10px;color:var(--muted);text-align:right;}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:19px;margin-left:9px;line-height:1;padding:0;}
  .empty{text-align:center;color:var(--muted);margin-top:50px;font-size:13px;line-height:1.8;}
  .empty-icon{font-size:32px;margin-bottom:10px;}
  .entry-type-badge{font-size:9px;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:600;}
  .badge-exercise{background:#e0f0e0;color:var(--green);}
  .badge-food{background:#fdf0e0;color:var(--accent);}

  /* History */
  .history-day{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 4px #c9873a09;}
  .history-day:active{border-color:var(--accent);}
  .history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .history-date{font-size:13px;font-weight:700;}
  .history-kcal{font-size:14px;font-weight:800;}
  .history-bar-wrap{background:var(--border);border-radius:3px;height:4px;overflow:hidden;}
  .history-bar{height:100%;border-radius:3px;}
  .history-macros{display:flex;gap:10px;margin-top:5px;}
  .history-macro{font-size:10px;color:var(--muted);}

  /* Summary */
  .circle-wrap{display:flex;justify-content:center;margin-bottom:14px;margin-top:6px;}
  .circle-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .circle-kcal{font-size:24px;font-weight:800;}
  .circle-goal-lbl{font-size:10px;color:var(--muted);}
  .macro-row{margin-bottom:7px;}
  .macro-top{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;}
  .macro-top span:last-child{color:var(--text);}
  .macro-track{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
  .macro-fill{height:100%;border-radius:4px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;box-shadow:0 1px 3px #c9873a09;}
  .stat-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .stat-val{font-size:17px;font-weight:700;}
  .achieve-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
  .exercise-card{background:#f0f8f0;border:1px solid #a8d4a8;border-radius:11px;padding:11px 13px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}

  /* Settings */
  .setting-row{display:flex;justify-content:space-between;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;}
  .setting-key{font-size:12px;color:var(--muted);}
  .setting-val{font-size:13px;font-weight:600;}
  .reset-btn{width:100%;padding:12px 0;border-radius:11px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:13px;margin-top:6px;}
  .section-title{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:10px;margin-top:14px;}

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div id="app">

  <!-- API KEY SCREEN -->
  <div id="screen-apikey" style="display:none;">
    <div class="apikey-logo">✦</div>
    <div class="apikey-title">NutriAI</div>
    <div class="apikey-sub">Anthropic APIキーを入力してください。<br>キーはこのデバイスにのみ保存されます。</div>
    <div class="apikey-box">
      <div class="apikey-label">Anthropic APIキー</div>
      <input type="password" class="apikey-input" id="apikeyInput" placeholder="sk-ant-..." oninput="onApiKeyInput()">
      <div class="apikey-hint">キーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得できます。</div>
      <div class="apikey-error" id="apikeyError">sk-ant- から始まるキーを入力してください。</div>
      <button class="apikey-btn" id="apikeyBtn" onclick="saveApiKey()" disabled>保存して始める</button>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header" id="mainHeader" style="display:none;">
    <div>
      <div class="logo"><span>✦</span> NutriAI</div>
      <div class="logo-sub">AI Calorie Tracker</div>
    </div>
    <div class="kcal-badge" id="headerBadge" onclick="switchTab('summary')" style="display:none">
      <div class="val" id="headerKcal">0</div>
      <div class="sub" id="headerGoal">/ 2000 kcal</div>
    </div>
    <div id="headerSetup" style="font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;">初期設定中</div>
  </div>

  <!-- ONBOARDING -->
  <div id="screen-ob" class="screen" style="overflow:hidden;">
    <div style="padding:16px 14px 4px;flex-shrink:0;">
      <div style="font-size:20px;font-weight:800;">プロフィール設定</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">目標体重からカロリーを自動計算します</div>
    </div>
    <div class="ob-wrap" id="obWrap"></div>
  </div>

  <!-- CHAT -->
  <div id="screen-chat" class="screen">
    <div class="date-nav">
      <button class="date-arrow" onclick="changeDay(-1)">‹</button>
      <div style="text-align:center;">
        <div class="date-label" id="chatDateLabel"></div>
        <div class="date-today" id="chatDateToday"></div>
      </div>
      <button class="date-arrow" id="chatFwdBtn" onclick="changeDay(1)">›</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
      <textarea id="chatInput" rows="2" placeholder="食事：ご飯1杯と卵焼き&#10;運動：30分ウォーキング"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen">
    <div class="date-nav">
      <button class="date-arrow" onclick="changeDay(-1)">‹</button>
      <div style="text-align:center;">
        <div class="date-label" id="logDateLabel"></div>
        <div class="date-today" id="logDateToday"></div>
      </div>
      <button class="date-arrow" id="logFwdBtn" onclick="changeDay(1)">›</button>
    </div>
    <div class="scroll" id="logList"></div>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div class="scroll" id="historyContent"></div>
  </div>

  <!-- SUMMARY -->
  <div id="screen-summary" class="screen">
    <div class="date-nav">
      <button class="date-arrow" onclick="changeDay(-1)">‹</button>
      <div style="text-align:center;">
        <div class="date-label" id="summaryDateLabel"></div>
        <div class="date-today" id="summaryDateToday"></div>
      </div>
      <button class="date-arrow" id="summaryFwdBtn" onclick="changeDay(1)">›</button>
    </div>
    <div class="scroll" id="summaryContent"></div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <div class="scroll" id="settingsContent"></div>
  </div>

  <nav class="nav" id="mainNav" style="display:none;">
    <button class="nav-btn active" onclick="switchTab('chat')" id="nav-chat">
      <span class="nav-icon">💬</span><span class="nav-label">今日</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="switchTab('log')" id="nav-log">
      <span class="nav-icon">📋</span><span class="nav-label">記録</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="switchTab('history')" id="nav-history">
      <span class="nav-icon">📅</span><span class="nav-label">履歴</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="switchTab('summary')" id="nav-summary">
      <span class="nav-icon">📊</span><span class="nav-label">分析</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="switchTab('settings')" id="nav-settings">
      <span class="nav-icon">⚙️</span><span class="nav-label">設定</span><span class="nav-dot"></span>
    </button>
  </nav>
</div>

<script>
const PK='nutriai_profile', LK='nutriai_log', CK='nutriai_chat', AK='nutriai_apikey';
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}};
const saveRaw=(k,v)=>localStorage.setItem(k,v);
const loadRaw=(k)=>localStorage.getItem(k)||'';

let profile=load(PK,null), allLog=load(LK,{}), allChat=load(CK,{});
let apiKey=loadRaw(AK);
let viewDate=todayStr(), currentTab='chat', sending=false;
let obStep=0, obData={sex:'male',age:30,height:170,weight:70,target:65,activity:'moderate'};

const SYSTEM_PROMPT=`You are a nutrition and fitness AI assistant. When the user describes food they ate, respond with:
1. A short friendly message in Japanese
2. A JSON block with type "food":
\`\`\`json
{"type":"food","items":[{"name":"food name","calories":200,"protein":10,"carbs":25,"fat":8,"amount":"1 serving"}],"total_calories":200,"total_protein":10,"total_carbs":25,"total_fat":8,"message":"One nutrition tip in Japanese."}
\`\`\`

When the user describes exercise/workout they did, respond with:
1. A short friendly message in Japanese
2. A JSON block with type "exercise":
\`\`\`json
{"type":"exercise","items":[{"name":"exercise name","calories_burned":200,"duration":"30分","amount":"30分"}],"total_calories_burned":200,"message":"One fitness tip in Japanese."}
\`\`\`

Use accurate data. Support Japanese and English. For other questions, answer in Japanese without JSON.`;

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function formatDate(s){const[y,m,d]=s.split('-');const days=['日','月','火','水','木','金','土'];return `${m}/${d}（${days[new Date(+y,+m-1,+d).getDay()]}）`;}
function isToday(s){return s===todayStr();}
function timeStr(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

function calcGoal(d){
  const bmr=d.sex==='male'?10*d.weight+6.25*d.height-5*d.age+5:10*d.weight+6.25*d.height-5*d.age-161;
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725}[d.activity]||1.375;
  const diff=d.target-d.weight, adj=diff<-5?-500:diff<-2?-300:diff>5?300:diff>2?200:0;
  return Math.max(1200,Math.round(bmr*mult)+adj);
}
function modeLabel(d){const x=d.target-d.weight;return x<-1?'減量':x>1?'増量':'維持';}
function modeColor(d){const x=d.target-d.weight;return x<-1?'var(--pink)':x>1?'var(--green)':'var(--accent)';}

function dayTotals(date){
  const items=allLog[date]||[];
  const food=items.filter(i=>i.type!=='exercise');
  const exercise=items.filter(i=>i.type==='exercise');
  const foodCal=food.reduce((s,i)=>s+i.calories,0);
  const exCal=exercise.reduce((s,i)=>s+(i.calories_burned||0),0);
  return{
    cal:foodCal,
    exercise:exCal,
    net:foodCal-exCal,
    p:food.reduce((s,i)=>s+i.protein,0),
    c:food.reduce((s,i)=>s+i.carbs,0),
    f:food.reduce((s,i)=>s+i.fat,0),
  };
}

function sld(k,l,v,min,max,u){return `<div class="slider-wrap"><div class="slider-top"><span class="slider-label">${l}</span><span class="slider-val" id="sv-${k}">${v} ${u}</span></div><input type="range" min="${min}" max="${max}" value="${v}" oninput="upSld('${k}','${u}',this.value)"><div class="slider-range"><span>${min}</span><span>${max}</span></div></div>`;}

function upSld(k,u,v){obData[k]=Number(v);const e=document.getElementById('sv-'+k);if(e)e.textContent=v+' '+u;if(obStep>=1)renderOb();}
function obBack(){obStep--;renderOb();}

const chatInput=document.getElementById('chatInput');
chatInput.addEventListener('input',()=>{document.getElementById('sendBtn').classList.toggle('ready',chatInput.value.trim().length>0);});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

async function sendMessage(){
  const text=chatInput.value.trim();
  if(!text||sending)return;
  sending=true;
  const t=timeStr();
  chatInput.value='';document.getElementById('sendBtn').classList.remove('ready');
  addBubbleDOM('user',text,null,true,t,null);
  const tid='t'+Date.now();
  document.getElementById('chatMessages').insertAdjacentHTML('beforeend',
    `<div class="bubble-wrap ai" id="${tid}"><div class="ai-avatar">✦</div><div class="typing"><div class="dot" style="animation:blink 1.2s ease 0s infinite"></div><div class="dot" style="animation:blink 1.2s ease .2s infinite"></div><div class="dot" style="animation:blink 1.2s ease .4s infinite"></div></div></div>`);
  scrollChat();
  try{
    const hist=allChat[viewDate]||[];
    const apiMsgs=hist.map(m=>({role:m.role==='ai'?'assistant':m.role,content:m.raw||m.text}));
    const res=await fetch('https://nutriai-proxydeploy.f-shichijo.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:apiMsgs})
    });
    const data=await res.json();
    const raw=data.content?.[0]?.text||'エラーが発生しました。';
    document.getElementById(tid)?.remove();
    const match=raw.match(/```json\s*([\s\S]*?)```/);
    let parsed=null;
    if(match){try{parsed=JSON.parse(match[1]);}catch{}}
    const textOnly=raw.replace(/```json[\s\S]*?```/g,'').trim();
    const replyTime=timeStr();
    let display=textOnly;
    let bubbleType=null;

    if(parsed?.type==='food'&&parsed?.items){
      const ts=Date.now();
      if(!allLog[viewDate])allLog[viewDate]=[];
      allLog[viewDate].push(...parsed.items.map((it,i)=>({...it,id:`${ts}-${i}`,type:'food'})));
      save(LK,allLog);
      const lines=parsed.items.map(it=>`• ${it.name} — ${it.calories} kcal`).join('\n');
      display=`${textOnly}\n\n${lines}\n\n📊 摂取合計: ${parsed.total_calories} kcal${parsed.message?'\n💡 '+parsed.message:''}`;
      bubbleType='food';
    } else if(parsed?.type==='exercise'&&parsed?.items){
      const ts=Date.now();
      if(!allLog[viewDate])allLog[viewDate]=[];
      allLog[viewDate].push(...parsed.items.map((it,i)=>({...it,id:`${ts}-${i}`,type:'exercise',calories:0,protein:0,carbs:0,fat:0})));
      save(LK,allLog);
      const lines=parsed.items.map(it=>`• ${it.name} — ${it.calories_burned} kcal消費`).join('\n');
      display=`${textOnly}\n\n${lines}\n\n🏃 消費合計: ${parsed.total_calories_burned} kcal${parsed.message?'\n💡 '+parsed.message:''}`;
      bubbleType='exercise';
    }

    addBubbleDOM('ai',display,raw,true,replyTime,bubbleType);
    updateHeader();
  }catch(e){
    document.getElementById(tid)?.remove();
    addBubbleDOM('ai','エラーが発生しました。もう一度お試しください。',null,true,timeStr(),null);
  }
  sending=false;
}

function addBubbleDOM(role,text,raw,doSave,time,bubbleType){
  const msgs=document.getElementById('chatMessages');
  // timestamp
  if(time){
    const ts=document.createElement('div');
    ts.className='timestamp '+(role==='user'?'user':'ai');
    ts.textContent=time;
    msgs.appendChild(ts);
  }
  const div=document.createElement('div');
  div.className='bubble-wrap '+(role==='user'?'user':'ai');
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const bubbleClass=role==='ai'?(bubbleType==='exercise'?'bubble exercise':'bubble ai'):'bubble user';
  div.innerHTML=role==='ai'
    ?`<div class="ai-avatar">✦</div><div class="${bubbleClass}">${esc}</div>`
    :`<div class="${bubbleClass}">${esc}</div>`;
  msgs.appendChild(div);
  scrollChat();
  if(doSave){
    if(!allChat[viewDate])allChat[viewDate]=[];
    allChat[viewDate].push({role,text,raw:raw||text,time,bubbleType});
    save(CK,allChat);
  }
}

// ── History ────────────────────────────────────────────────

// ── Summary ────────────────────────────────────────────────
function renderSummary(){
  if(!profile)return;
  const t=dayTotals(viewDate),goal=profile.calorieGoal;
  const net=t.net,pct=Math.min(net/goal,1),r=52,circ=2*Math.PI*r,dash=circ*pct;
  const remaining=goal-net,over=remaining<0;
  const maxP=Math.round(goal*0.3/4),maxC=Math.round(goal*0.5/4),maxF=Math.round(goal*0.25/9);
  document.getElementById('summaryContent').innerHTML=`
    <div class="circle-wrap"><div style="position:relative;width:120px;height:120px;">
      <svg width="120" height="120" style="transform:rotate(-90deg)">
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--border)" stroke-width="9"/>
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="${over?'var(--pink)':'var(--accent)'}" stroke-width="9"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="circle-center"><div class="circle-kcal">${net}</div><div class="circle-goal-lbl">/ ${goal} kcal</div></div>
    </div></div>
    <div style="text-align:center;font-size:11px;font-weight:600;color:${over?'var(--pink)':'var(--green)'};margin-bottom:14px;margin-top:-2px;">${over?`${Math.abs(remaining)} kcal オーバー`:`あと ${remaining} kcal`}</div>
    ${t.exercise>0?`<div class="exercise-card"><span style="font-size:12px;color:var(--green);font-weight:600;">🏃 運動消費カロリー</span><span style="font-size:17px;font-weight:800;color:var(--green);">-${t.exercise} kcal</span></div>`:''}
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:8px;margin-bottom:9px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:600;">マクロ栄養素</div>
      ${mb('タンパク質',t.p,maxP,'var(--green)')}${mb('炭水化物',t.c,maxC,'var(--orange)')}${mb('脂質',t.f,maxF,'var(--pink)')}
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">摂取カロリー</div><div class="stat-val" style="color:var(--accent)">${t.cal} kcal</div></div>
      <div class="stat-card"><div class="stat-label">正味カロリー</div><div class="stat-val" style="color:${over?'var(--pink)':'var(--text)'}">${net} kcal</div></div>
      <div class="stat-card"><div class="stat-label">タンパク質</div><div class="stat-val" style="color:var(--green)">${t.p}g</div></div>
      <div class="stat-card"><div class="stat-label">炭水化物</div><div class="stat-val" style="color:var(--orange)">${t.c}g</div></div>
    </div>
    <div class="achieve-card"><span style="font-size:12px;color:var(--muted);">目標達成率</span><span style="font-size:19px;font-weight:800;color:${over?'var(--pink)':'var(--accent)'}">${Math.round((net/goal)*100)}%</span></div>
    <div class="section-title" style="margin-top:18px;">📅 直近7日間</div>${weekChart()}`;
}
function mb(l,v,max,color){const pct=Math.min((v/max)*100,100);return `<div class="macro-row"><div class="macro-top"><span>${l}</span><span>${v}g</span></div><div class="macro-track"><div class="macro-fill" style="width:${pct}%;background:${color}"></div></div></div>`;}
function weekChart(){
  const goal=profile?.calorieGoal||2000;
  let h=`<div style="display:flex;gap:6px;align-items:flex-end;height:70px;margin-bottom:6px;">`;
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const t=dayTotals(s),pct=t.net>0?Math.min((t.net/goal)*100,100):0,over=t.net>goal,isV=s===viewDate;
    const days=['日','月','火','水','木','金','土'];
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div style="font-size:9px;color:${over?'var(--pink)':'var(--muted)'};">${t.net>0?t.net:''}</div>
      <div style="width:100%;height:${Math.max(pct*0.55,2)}px;background:${over?'var(--pink)':isV?'var(--accent)':'var(--border)'};border-radius:3px 3px 0 0;min-height:2px;"></div>
      <div style="font-size:9px;color:${isV?'var(--accent)':'var(--muted)'};">${days[d.getDay()]}</div>
    </div>`;
  }
  return h+`</div>`;
}

  if(!profile)return;
  const aL={sedentary:'ほぼ座り仕事',light:'軽い運動あり',moderate:'適度に活動',active:'活発'};
  const rows=[['性別',profile.sex==='male'?'男性':'女性'],['年齢',profile.age+'歳'],['身長',profile.height+'cm'],['現在体重',profile.weight+'kg'],['目標体重',profile.target+'kg'],['活動量',aL[profile.activity]]];
  let h=`<div style="font-size:15px;font-weight:800;margin-bottom:3px;">現在の設定</div><div style="font-size:11px;color:var(--muted);margin-bottom:14px;">プロフィールと目標カロリー</div>`;
  rows.forEach(([k,v])=>{h+=`<div class="setting-row"><span class="setting-key">${k}</span><span class="setting-val">${v}</span></div>`;});
  h+=`<div style="background:#c9873a18;border:1px solid var(--accent);border-radius:11px;padding:12px 14px;margin-top:8px;margin-bottom:14px;">
    <div style="font-size:10px;color:var(--muted);">1日の目標カロリー</div>
    <div style="font-size:28px;font-weight:800;color:var(--accent);">${profile.calorieGoal} <span style="font-size:12px;color:var(--muted);">kcal</span></div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px;">${modeLabel({target:profile.target,weight:profile.weight})}モード</div>
  </div>
  <div class="section-title">データ管理</div>
  <button class="reset-btn" onclick="resetProfile()">プロフィールを再設定する</button>
  <button class="reset-btn" style="color:var(--pink);border-color:var(--pink);margin-top:6px;" onclick="clearAll()">すべての記録を削除する</button>
  <div class="section-title">APIキー</div>
  <button class="reset-btn" onclick="resetApiKey()">APIキーを再設定する</button>`;
  document.getElementById('settingsContent').innerHTML=h;
}
function resetProfile(){
  if(!confirm('プロフィールを再設定しますか？記録は保持されます。'))return;
  profile=null;localStorage.removeItem(PK);obStep=0;obData={sex:'male',age:30,height:170,weight:70,target:65,activity:'moderate'};
  ['chat','log','history','summary','settings'].forEach(t=>{document.getElementById('screen-'+t).classList.remove('active');document.getElementById('nav-'+t).classList.remove('active');});
  document.getElementById('mainNav').style.display='none';document.getElementById('headerBadge').style.display='none';document.getElementById('headerSetup').style.display='block';
  document.getElementById('screen-ob').classList.add('active');renderOb();
}
function clearAll(){
  if(!confirm('すべての食事記録を削除しますか？'))return;
  allLog={};allChat={};save(LK,allLog);save(CK,allChat);updateHeader();alert('削除しました。');
}
function resetApiKey(){
  if(!confirm('APIキーを再設定しますか？'))return;
  localStorage.removeItem(AK);apiKey='';
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('mainNav').style.display='none';
  ['chat','log','history','summary','settings'].forEach(t=>{document.getElementById('screen-'+t).classList.remove('active');document.getElementById('nav-'+t).classList.remove('active');});
  document.getElementById('screen-apikey').style.display='flex';
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

if(!apiKey){
  document.getElementById('screen-apikey').style.display='flex';
}else{
  showMainApp();
}
</script>
</body>
</html>
